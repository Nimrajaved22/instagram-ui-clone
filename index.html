<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram UI Layout Mockup</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <main class="phone-screen">
            <header class="status-bar">
                <div class="dots">••</div>
                <div class="right-icons"><i class="fas fa-signal"></i> <i class="fas fa-battery-three-quarters"></i></div>
            </header>
            
            <div class="nav-header">
                <span class="username">____username____</span>
                <div class="nav-icons"><i class="fas fa-bars"></i><span class="notification-dot"></span></div>
            </div>

            <section class="profile-info">
                <div class="profile-pic-container">
                    <div class="profile-pic main-pic"></div>
                    <div class="add-story-btn">+</div>
                </div>
                <div class="stats-container">
                    <div class="stat-item"><strong>--</strong><span>Posts</span></div>
                    <div class="stat-item"><strong>--</strong><span>Followers</span></div>
                    <div class="stat-item"><strong>--</strong><span>Following</span></div>
                </div>
            </section>

            <div class="profile-bio">
                <div class="line short-line"></div>
                <div class="line extra-short-line"></div>
            </div>

            <div class="highlights-container">
                <div class="highlight-item"><div class="highlight-circle empty-circle">+</div></div>
                <div class="highlight-item"><div class="highlight-circle filled-circle"></div></div>
                <div class="highlight-item"><div class="highlight-circle filled-circle"></div></div>
                <div class="highlight-item"><div class="highlight-circle filled-circle"></div></div>
            </div>

            <div class="tabs-bar">
                <div class="tab active"><i class="fas fa-th"></i></div>
                <div class="tab"><i class="fas fa-id-badge"></i></div>
            </div>

            <div class="posts-grid">
                <div class="grid-post"></div>
                <div class="grid-post"></div>
                <div class="grid-post"></div>
            </div>

            <footer class="bottom-nav">
                <i class="fas fa-home"></i>
                <i class="fas fa-search"></i>
                <i class="far fa-plus-square"></i>
                <i class="far fa-heart"></i>
                <i class="fas fa-user"></i>
            </footer>
        </main>


        <main class="phone-screen">
            <header class="status-bar">
                <div class="dots">••</div>
                <div class="right-icons"><i class="fas fa-signal"></i> <i class="fas fa-battery-three-quarters"></i></div>
            </header>

            <div class="nav-header">
                <i class="far fa-camera"></i>
                <div class="feed-right-icons">
                    <i class="far fa-paper-plane"></i>
                </div>
            </div>

            <div class="stories-bar">
                <div class="story-wrapper"><div class="story-ring active-ring"><div class="story-inside"></div></div></div>
                <div class="story-wrapper"><div class="story-ring"><div class="story-inside"></div></div></div>
                <div class="story-wrapper"><div class="story-ring"><div class="story-inside"></div></div></div>
                <div class="story-wrapper"><div class="story-ring"><div class="story-inside"></div></div></div>
                <div class="story-wrapper"><div class="story-ring"><div class="story-inside"></div></div></div>
            </div>

            <article class="feed-post-container">
                <div class="post-header">
                    <div class="post-user-pic"></div>
                    <div class="post-user-info">
                        <div class="line micro-line"></div>
                    </div>
                    <i class="fas fa-ellipsis-v icon-right"></i>
                </div>
                
                <div class="main-post-content"></div>

                <div class="post-actions">
                    <div class="left-actions">
                        <i class="fas fa-heart text-danger"></i>
                        <i class="far fa-comment"></i>
                        <i class="far fa-paper-plane"></i>
                    </div>
                    <i class="far fa-bookmark"></i>
                </div>

                <div class="post-caption-area">
                    <div class="caption-row"><div class="post-user-pic micro"></div> <div class="line short-line"></div></div>
                    <div class="caption-row"><div class="post-user-pic micro"></div> <div class="line extra-short-line"></div></div>
                </div>
            </article>

            <footer class="bottom-nav">
                <i class="fas fa-home"></i>
                <i class="fas fa-search"></i>
                <i class="far fa-plus-square"></i>
                <div class="nav-heart-wrapper">
                    <i class="fas fa-heart"></i>
                    <div class="heart-popup"><i class="fas fa-heart"></i> <i class="fas fa-comment"></i></div>
                </div>
                <i class="far fa-user"></i>
            </footer>
        </main>


        <main class="phone-screen">
            <header class="status-bar">
                <div class="dots">••</div>
                <div class="right-icons"><i class="fas fa-signal"></i> <i class="fas fa-battery-three-quarters"></i></div>
            </header>

            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <div class="line micro-line"></div>
                </div>
                <i class="fas fa-expand-arrows-alt scan-icon"></i>
            </div>

            <div class="category-tabs">
                <div class="pill-tab"><i class="fas fa-shopping-bag"></i></div>
                <div class="pill-tab"><i class="fas fa-lock"></i></div>
                <div class="pill-tab"></div>
                <div class="pill-tab"></div>
            </div>

            <div class="explore-grid">
                <div class="explore-item item-vertical-tall"></div>
                <div class="explore-item"></div>
                <div class="explore-item"></div>
                <div class="explore-item"></div>
                <div class="explore-item"></div>
                <div class="explore-item"></div>
                <div class="explore-item"></div>
                <div class="explore-item"></div>
            </div>

            <footer class="bottom-nav">
                <i class="far fa-home"></i>
                <i class="fas fa-search"></i>
                <i class="far fa-plus-square"></i>
                <i class="far fa-heart"></i>
                <i class="far fa-user"></i>
            </footer>
        </main>

    </div>

</body>
</html>
